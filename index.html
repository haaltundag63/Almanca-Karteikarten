<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Almanca Karteikarten</title>
<style>
  :root{
    --cream:#FFF8EC;
    --ink:#232323;
    --pink:#FFD1DC;
    --peach:#FFDCB8;
    --mint:#CFF5E7;
    --sky:#CFE8FF;
    --lilac:#E3D4FF;
    --lemon:#FFF3B0;
    --coral:#FFB3A7;
    --sage:#D8F0C8;
    --accent:#FF6F91;
    --shadow: rgba(35,35,35,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    height:100%;
    background:var(--cream);
    color:var(--ink);
    font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #app{min-height:100%;display:flex;flex-direction:column;}

  /* ---------- HOME ---------- */
  header.home-head{
    padding:36px 20px 18px;
    text-align:center;
  }
  header.home-head h1{
    font-size:clamp(28px,6vw,42px);
    margin:0 0 6px;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  header.home-head h1 span{color:var(--accent);}
  header.home-head p{
    margin:0;
    color:#6b6b6b;
    font-size:15px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:14px;
    padding:10px 20px 40px;
    max-width:900px;
    margin:0 auto;
    width:100%;
  }
  .topic-card{
    border-radius:22px;
    padding:20px 16px;
    cursor:pointer;
    position:relative;
    min-height:130px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 6px 0 var(--shadow);
    border:2px solid rgba(35,35,35,0.06);
    transition:transform .15s ease, box-shadow .15s ease;
    user-select:none;
  }
  .topic-card:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .topic-card h3{margin:0 0 4px;font-size:17px;font-weight:700;line-height:1.25;}
  .topic-card p{margin:0;font-size:12px;color:rgba(35,35,35,0.65);line-height:1.3;}
  .topic-card .count{
    align-self:flex-end;
    font-size:12px;
    font-weight:700;
    background:rgba(255,255,255,0.6);
    padding:3px 10px;
    border-radius:20px;
    margin-top:10px;
  }

  /* ---------- STUDY VIEW ---------- */
  .study{
    display:none;
    flex:1;
    flex-direction:column;
    height:100vh;
    height:100dvh;
  }
  .study.active{display:flex;}
  .study-top{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
  }
  .back-btn{
    background:white;
    border:none;
    border-radius:14px;
    padding:9px 14px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 3px 0 var(--shadow);
    color:var(--ink);
  }
  .back-btn:active{transform:translateY(2px);box-shadow:none;}
  .study-title{
    flex:1;
    text-align:center;
    font-weight:800;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .icon-btn{
    background:white;
    border:none;
    width:38px;height:38px;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
    box-shadow:0 3px 0 var(--shadow);
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:active{transform:translateY(2px);box-shadow:none;}

  .progress-wrap{
    padding:0 20px;
  }
  .progress-bar{
    height:8px;
    background:rgba(35,35,35,0.08);
    border-radius:6px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    border-radius:6px;
    transition:width .25s ease;
  }
  .progress-label{
    text-align:center;
    font-size:12px;
    color:#8a8a8a;
    margin-top:6px;
    font-weight:600;
  }

  .card-stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px 20px 6px;
    perspective:1400px;
    touch-action:pan-y;
  }
  .card{
    width:100%;
    max-width:480px;
    height:min(52vh,420px);
    position:relative;
    transform-style:preserve-3d;
    transition:transform .45s cubic-bezier(.2,.9,.25,1);
    cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg);}
  .card.swipe-left{transform:translateX(-140%) rotate(-12deg);}
  .card.swipe-right{transform:translateX(140%) rotate(12deg);}
  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    border-radius:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:34px 28px;
    text-align:center;
    box-shadow:0 10px 0 var(--shadow), 0 20px 30px rgba(0,0,0,0.08);
    border:3px solid rgba(35,35,35,0.08);
  }
  .face .txt{
    font-size:clamp(19px,4.6vw,27px);
    font-weight:700;
    line-height:1.4;
    color:var(--ink);
    max-height:100%;
    overflow-y:auto;
  }
  .face .tag{
    position:absolute;
    top:18px;left:22px;
    font-size:11px;
    font-weight:800;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:rgba(35,35,35,0.45);
  }
  .face.back{transform:rotateY(180deg);}

  .hint{
    text-align:center;
    font-size:12.5px;
    color:#9a9a9a;
    padding:2px 0 10px;
    font-weight:600;
  }

  .controls{
    display:flex;
    gap:12px;
    justify-content:center;
    padding:6px 20px 28px;
    padding-bottom:calc(28px + env(safe-area-inset-bottom));
  }
  .ctrl-btn{
    border:none;
    border-radius:18px;
    padding:14px 22px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 5px 0 var(--shadow);
    min-width:90px;
  }
  .ctrl-btn:active{transform:translateY(3px);box-shadow:none;}
  .ctrl-prev{background:white;color:var(--ink);}
  .ctrl-flip{background:var(--ink);color:white;}
  .ctrl-next{background:var(--accent);color:white;}

  .done-screen{
    display:none;
    flex:1;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px;
    gap:18px;
  }
  .done-screen.active{display:flex;}
  .done-screen .emoji{font-size:54px;}
  .done-screen h2{margin:0;font-size:24px;font-weight:800;}
  .done-screen p{margin:0;color:#767676;font-size:14px;}
  .done-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(35,35,35,0.15);border-radius:10px;}

  @media (max-width:380px){
    .ctrl-btn{padding:12px 16px;font-size:14px;min-width:76px;}
  }
</style>
</head>
<body>
<div id="app">

  <div id="homeView">
    <header class="home-head">
      <h1>Almanca <span>Karteikarten</span></h1>
      <p>Bir konu seç, çalışmaya başla · kaydırarak veya klavyeyle ilerle</p>
    </header>
    <div class="grid" id="topicGrid"></div>
  </div>

  <div class="study" id="studyView">
    <div class="study-top">
      <button class="back-btn" id="btnBack">← Konular</button>
      <div class="study-title" id="studyTitle"></div>
      <button class="icon-btn" id="btnShuffle" title="Karıştır">🔀</button>
      <button class="icon-btn" id="btnFullscreen" title="Tam ekran">⛶</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
    <div class="card-stage" id="cardStage">
      <div class="card" id="card">
        <div class="face front"><span class="tag">Almanca</span><div class="txt" id="frontTxt"></div></div>
        <div class="face back"><span class="tag">Türkçe</span><div class="txt" id="backTxt"></div></div>
      </div>
    </div>
    <div class="hint">Karta dokun / tıkla → çevir · sağa/sola kaydır veya ← → tuşları → geç</div>
    <div class="controls">
      <button class="ctrl-btn ctrl-prev" id="btnPrev">‹ Geri</button>
      <button class="ctrl-btn ctrl-flip" id="btnFlip">Çevir</button>
      <button class="ctrl-btn ctrl-next" id="btnNext">İleri ›</button>
    </div>
  </div>

  <div class="done-screen" id="doneView">
    <div class="emoji">🎉</div>
    <h2 id="doneTitle">Bu grubu bitirdin!</h2>
    <p id="doneSub"></p>
    <div class="done-actions">
      <button class="ctrl-btn ctrl-prev" id="btnRepeat">Tekrar Çalış</button>
      <button class="ctrl-btn ctrl-next" id="btnNextGroup">Sonraki Grup ›</button>
      <button class="ctrl-btn ctrl-flip" id="btnDoneHome">Konulara Dön</button>
    </div>
  </div>

</div>

gitmek için para biriktiriyor."}, {"f": "Er zählte das Geld, damit er nicht zu viel zahlen.", "b": "Fazla ödememek için parayı saydı."}, {"f": "Er zählte das Geld, um nicht zu viel zu bezahlen.", "b": "Fazla ödememek için parayı saydı."}, {"f": "Er verließ die Sitzung, damit er den Zug erreichen würde.", "b": "Trene yetişebilmek için toplantıdan ayrıldı."}, {"f": "Er verließ die Sitzung, um den Zug zu erreichen.", "b": "Treni yakalamak için toplantıdan ayrıldı."}, {"f": "Was kann man tun, damit man schnell Deutsch lernt?", "b": "Hızlı bir şekilde Almanca öğrenmek için ne yapılabilir?"}, {"f": "Was kann man tun, um schnell Deutsch zu lernen?", "b": "Hızlı bir şekilde Almanca öğrenmek için ne yapılabilir?"}, {"f": "hiermit", "b": "bununla beraber, beraberinde, bu vesile ile (genelde mektuplarda kullanılır)"}, {"f": "damit (Adv.)", "b": "bu suretle, böylece, bununla, onunla, şununla"}, {"f": "damit (Konjunktion)", "b": "-mek için, -mesi için, -sin diye (fiili sona atar, Nebensatz)"}]}, {"id": "alltag", "title": "Alltag – Günlük Kalıplar", "sub": "Ezberlemeye değer günlük konuşma kalıpları", "cards": [{"f": "Hast du schon gehört, dass sich Ali und Aysel getrennt haben?", "b": "Ali ve Aysel'in ayrıldığını duydun mu?"}, {"f": "Hast du schon gehört, dass Ahmet heiratet?", "b": "Ahmet'in evlendiğini duydun mu?"}, {"f": "Hast du so etwas schon mal gehört?", "b": "Daha önce böyle bir şey duydun mu?"}, {"f": "Hast du schon gehört, was passiert ist?", "b": "Ne olduğunu duydun mu?"}, {"f": "Ich kann es kaum erwarten, dich zu sehen.", "b": "Seni görmek için sabırsızlanıyorum."}, {"f": "Ich kann es kaum erwarten, deine Familie kennenzulernen.", "b": "Aileni tanımak için sabırsızlanıyorum."}, {"f": "Ich kann es kaum erwarten, dass die Schule anfängt.", "b": "Okulun başlamasını sabırsızlıkla bekliyorum."}, {"f": "Ich kann es kaum erwarten, Ali die gute Nachricht zu erzählen.", "b": "Ali'ye iyi haberi vermek için sabırsızlanıyorum."}, {"f": "Ich kann es kaum erwarten, nach Hause zu kommen.", "b": "Eve gitmek için sabırsızlanıyorum."}, {"f": "Ich kann es kaum erwarten, erwachsen zu werden.", "b": "Büyümek için sabırsızlanıyorum."}, {"f": "Ich kann dir gar nicht sagen, wie traurig mich das macht.", "b": "Bunun beni ne kadar üzdüğünü anlatamam."}, {"f": "Ich kann dir gar nicht sagen, wie dankbar ich dir für deine Hilfe bin!", "b": "Yardımın için ne kadar minnettar olduğumu anlatamam!"}, {"f": "Ich kann dir gar nicht sagen, wie sehr ich dich vermisst habe!", "b": "Seni ne kadar özlediğimi anlatamam!"}, {"f": "Ich weiß, wie man es macht.", "b": "Nasıl yapılacağını biliyorum."}, {"f": "Ich weiß, wie du dich fühlst.", "b": "Nasıl hissettiğini biliyorum."}, {"f": "Ich weiß, wie es ist, allein zu sein.", "b": "Yalnız olmanın nasıl bir şey olduğunu biliyorum."}, {"f": "Ich weiß, was ich tun muss.", "b": "Ne yapmam gerektiğini biliyorum."}, {"f": "Ich weiß, was du denkst.", "b": "Ne düşündüğünü biliyorum."}, {"f": "Ich weiß, warum wir das machen.", "b": "Bunu neden yaptığımızı biliyorum."}, {"f": "Ich weiß, wann ich hätte kommen sollen, aber ich habe es zu der Zeit nicht geschafft.", "b": "Ne zaman gelmem gerektiğini biliyorum ama o zaman gelemedim."}, {"f": "Ich weiß, wo ich nach Ali suchen soll.", "b": "Ali'yi nerede arayacağımı biliyorum."}, {"f": "Ich weiß, wohin ich gehen soll.", "b": "Nereye gideceğimi biliyorum."}, {"f": "Ich weiß, dass du Ali vermisst.", "b": "Ali'yi özlediğini biliyorum."}, {"f": "Ich weiß nicht, was los ist.", "b": "Ne olduğunu bilmiyorum."}, {"f": "Ich weiß kaum, wie ich es sagen soll, aber ...", "b": "Nasıl söyleyeceğimi neredeyse bilemiyorum ama ..."}, {"f": "Ich wusste nicht, was ich sagen sollte.", "b": "Ne söyleyeceğimi bilemedim."}, {"f": "Ich verstehe nicht, warum Ali dich nicht mag.", "b": "Ali'nin seni neden sevmediğini anlamıyorum."}, {"f": "Es wird dir nicht gefallen, aber ...", "b": "Hoşlanmayacaksın ama ..."}, {"f": "Ich denke an dich in dieser schlechten Zeit.", "b": "Bu kötü zamanda seni düşünüyorum."}, {"f": "Ich kam mir wie ein Idiot vor.", "b": "Kendimi aptal gibi hissettim."}, {"f": "Ich fühlte mich wie ein Löwe.", "b": "Kendimi aslan gibi hissettim."}, {"f": "Ich fühlte mich verraten.", "b": "Kendimi ihanete uğramış hissettim."}, {"f": "Ich fühlte mich nie so lebendig.", "b": "Kendimi hiç bu kadar canlı hissetmemiştim."}, {"f": "Ich fühle mich jetzt viel besser.", "b": "Şimdi çok daha iyi hissediyorum."}, {"f": "Ich fühle mich, als ob ich alles tun kann.", "b": "Her şeyi yapabileceğimi hissediyorum."}, {"f": "Ich interessiere mich sehr für Tiere und Naturschutz.", "b": "Hayvanlar ve doğa koruma ile çok ilgileniyorum."}, {"f": "Ich interessiere mich überhaupt nicht für Politik.", "b": "Siyasetle hiç ilgilenmiyorum."}, {"f": "Ich mache mir nichts aus Sport.", "b": "Spor umrumda değil."}, {"f": "Ich mache mir nichts mehr aus Ali.", "b": "Artık Ali umurumda değil."}, {"f": "Ich habe große Hoffnung, bald eine Arbeit zu finden.", "b": "Yakında bir iş bulma konusunda büyük umudum var."}, {"f": "Ali hat mir die Augen geöffnet.", "b": "Ali gözlerimi açtı."}, {"f": "Danke, dass du mir die Augen geöffnet hast.", "b": "Gözlerimi açtığın için teşekkür ederim."}, {"f": "Das schlucke ich nicht.", "b": "Bunu yutmam."}, {"f": "Er ist nicht von gestern.", "b": "O dünkü çocuk değil."}, {"f": "Meiner Meinung nach sollten wir mehr Geld für Vereine ausgeben.", "b": "Bence eğitime/kulüplere daha fazla para harcamalıyız."}, {"f": "Was mich betrifft, bin ich zufrieden.", "b": "Bana gelince, ben memnunum."}, {"f": "Das ist einfach eine Frage der Zeit.", "b": "Bu sadece bir zaman meselesi."}, {"f": "Es ist nur eine Frage der Zeit, bis wir den Dieb finden.", "b": "Hırsızı bulmamız an meselesi."}, {"f": "Was schlagen Sie uns vor?", "b": "Bize ne tavsiye edersiniz?"}, {"f": "Können Sie uns ein paar Tipps geben?", "b": "Bize biraz tavsiye verebilir misiniz?"}, {"f": "Wie wäre es mit dem Kino?", "b": "Peki ya sinema nasıl olur?"}, {"f": "Darf ich einen anderen Vorschlag machen?", "b": "Başka bir öneride bulunabilir miyim?"}, {"f": "An deiner Stelle würde ich still sein.", "b": "Ben olsam susardım."}, {"f": "An deiner Stelle würde ich es blau anstreichen.", "b": "Ben olsam maviye boyardım."}, {"f": "An deiner Stelle würde ich nicht mit ihm reden.", "b": "Ben olsam onunla konuşmazdım."}, {"f": "An deiner Stelle würde ich Ahmets Rat befolgen.", "b": "Yerinde olsam Ahmet'in tavsiyesini dinlerdim."}, {"f": "Was würdest du an meiner Stelle tun?", "b": "Benim yerimde olsaydın ne yapardın?"}, {"f": "Ich übernehme die Verantwortung für diesen Fehler.", "b": "Bu hatanın sorumluluğunu alıyorum."}, {"f": "Ich übernehme überhaupt keine Verantwortung.", "b": "Hiç sorumluluk almıyorum."}, {"f": "Hättest du Lust, mit mir ins Kino zu gehen?", "b": "Benimle sinemaya gitmek ister misin?"}, {"f": "Hättest du Lust auf einen Cappuccino?", "b": "Bir kapuçino ister misin?"}, {"f": "Ich hätte Lust, mir einen japanischen Film anzusehen.", "b": "Bir Japon filmi izlemek istiyorum."}]}, {"id": "konnektoren", "title": "Konnektoren & Nebensätze", "sub": "Bağlaçlar ve yan cümleler", "cards": [{"f": "Ich esse ein Brot, ich habe nämlich Hunger.", "b": "Bir ekmek yiyorum, çünkü açım. (nämlich: sebep açıklaması)"}, {"f": "Ich kann zwar ein bisschen Polnisch, aber nicht perfekt.", "b": "Biraz Lehçe biliyorum ama mükemmel değil. (zwar...aber)"}, {"f": "Auto fahren hat teils Vorteile, teils aber auch Nachteile.", "b": "Araba kullanmanın kısmen avantajları kısmen de dezavantajları var. (teils...teils)"}, {"f": "Ich muss arbeiten. Darum habe ich keine Zeit.", "b": "Çalışmam gerekiyor. Bu yüzden vaktim yok. (darum: bu nedenle)"}, {"f": "Pierre hat viel geübt. Er hat infolgedessen die Prüfung bestanden.", "b": "Pierre çok çalıştı. Bu sebepten sınavı geçti. (infolgedessen)"}, {"f": "Infolge meines Urlaubs bin ich sehr zufrieden.", "b": "Tatilim nedeniyle çok memnunum. (infolge + Gen: nedeniyle)"}, {"f": "Pierre hat viel geübt. Er hat folglich die Prüfung bestanden.", "b": "Pierre çok çalıştı. Bu sebepten sınavı geçti. (folglich)"}, {"f": "Natascha muss noch lernen. Stattdessen geht sie mit ihrer Freundin aus.", "b": "Natascha'nın hâlâ ders çalışması lazım. Bunun yerine arkadaşıyla dışarı çıkıyor. (stattdessen)"}, {"f": "Anstatt zu lernen, geht Natascha mit ihrer Freundin aus.", "b": "Ders çalışmak yerine Natascha arkadaşıyla dışarı çıkıyor. (anstatt zu + Infinitiv: yerine)"}, {"f": "Ich habe das Auto genommen, statt mit dem Bus zu fahren.", "b": "Otobüsle gitmek yerine arabayı aldım. (statt zu)"}, {"f": "Karl liest ein Buch. Währenddessen klingelt das Telefon.", "b": "Karl kitap okuyor. Bu esnada telefon çalıyor. (währenddessen)"}, {"f": "Seitdem ich Ayse kenne, bin ich glücklich.", "b": "Ayşe'yi tanıdığımdan beri mutluyum. (seitdem: -den beri)"}, {"f": "Jetzt arbeite ich. Davor habe ich Deutsch gelernt.", "b": "Şimdi çalışıyorum. Öncesinde Almanca öğrendim. (davor: öncesinde)"}, {"f": "Während Tobias auf dem Land wohnt, lebt Sonja in der Stadt.", "b": "Tobias kırsalda yaşarken, Sonja şehirde yaşıyor. (während: -iken)"}, {"f": "Während unseres Spaziergangs regnete es die ganze Zeit.", "b": "Yürüyüşümüz boyunca sürekli yağmur yağdı. (während + Gen)"}, {"f": "Obgleich sie wieder gesund war, blieb sie noch ein paar Tage im Bett.", "b": "Tekrar sağlıklı olmasına rağmen birkaç gün daha yatakta kaldı. (obgleich: -e rağmen)"}, {"f": "Er ist nicht zu meiner Party gekommen, obschon ich ihn eingeladen habe.", "b": "Onu davet etmeme rağmen partime gelmedi. (obschon)"}, {"f": "Ungeachtet seiner schweren Erkältung, geht er spazieren.", "b": "Ağır soğuk algınlığına rağmen yürüyüşe çıkıyor. (ungeachtet + Gen: -e rağmen)"}, {"f": "Ungeachtet der Schwierigkeiten gewannen wir das Rennen.", "b": "Zorluklara rağmen yarışı kazandık."}, {"f": "Tabita wohnt auf dem Land, aber Sanyo lebt in der Stadt.", "b": "Tabita kırsalda yaşıyor, ama Sanyo şehirde yaşıyor. (aber: ancak)"}, {"f": "Früher lasen die Leute viele Bücher. Heute jedoch bevorzugen viele das Fernsehen.", "b": "Eskiden insanlar çok kitap okurdu. Bugün ise birçoğu televizyonu tercih ediyor. (jedoch: ancak, fiilden önce)"}, {"f": "Ich wohne auf dem Land, demgegenüber wohnt Michael in der Stadt.", "b": "Ben kırsalda yaşıyorum, buna karşılık Michael şehirde yaşıyor. (demgegenüber: buna karşılık)"}, {"f": "Solange ich in der Ausbildung bin, muss ich mit wenig Geld auskommen.", "b": "Eğitimde olduğum sürece az parayla idare etmem gerekiyor. (solange: -diği sürece)"}, {"f": "Bis ich perfekt Deutsch spreche, vergehen noch ein paar Jahre.", "b": "Mükemmel Almanca konuşana kadar birkaç yıl daha geçecek. (bis: -e kadar)"}, {"f": "Ich rufe Sie an, sobald ich etwas Neues weiß.", "b": "Yeni bir şey öğrenir öğrenmez sizi ararım. (sobald: -er -mez)"}, {"f": "Ich werde dich besuchen, sofern ich nicht arbeiten muss.", "b": "Çalışmam gerekmezse seni ziyaret edeceğim. (sofern: eğer, şayet)"}, {"f": "Falls es regnet, grillen wir auf dem Balkon.", "b": "Yağmur yağarsa balkonda barbekü yaparız. (falls: eğer)"}, {"f": "Auf der Autobahn gab es Stau, sodass Frau Müller zu spät zur Arbeit kam.", "b": "Otoyolda trafik sıkışıklığı vardı, bu yüzden Bayan Müller işe geç kaldı. (sodass: bu yüzden)"}, {"f": "Er hat jeden Tag sechzehn Stunden gearbeitet, deshalb wurde er krank.", "b": "Her gün on altı saat çalıştı, bu yüzden hasta oldu. (deshalb/deswegen/daher)"}, {"f": "Am Wochenende gab es so starke Regenfälle, dass viele Straßen überflutet wurden.", "b": "Hafta sonu o kadar şiddetli yağmur yağdı ki birçok cadde sular altında kaldı. (so...dass)"}, {"f": "Du siehst aus, als ob du sehr müde wärst.", "b": "Çok yorgun görünüyorsun, sanki. (als ob: sanki)"}, {"f": "Er ist viel zu arrogant, als dass er zuhören würde.", "b": "Dinleyemeyecek kadar kibirli. (zu...als dass)"}, {"f": "Wir müssen eine Woche vorher einen Tisch reservieren, da das Restaurant sehr beliebt ist.", "b": "Restoran çok popüler olduğu için bir hafta önceden masa ayırtmalıyız. (da: çünkü)"}, {"f": "Peter hat heute Morgen verschlafen, deshalb kam er zu spät zur Schule.", "b": "Peter bu sabah geç kalktı, bu yüzden okula geç kaldı."}, {"f": "Ich kenne schon Bonn. Dahin möchte ich ziehen.", "b": "Bonn'u zaten tanıyorum. Oraya taşınmak istiyorum. (dahin/dorthin)"}, {"f": "Warst du in Frankfurt? Daher kommt Goethe.", "b": "Frankfurt'ta mı bulundun? Goethe oradan geliyor. (daher: oradan)"}, {"f": "Der Test war schwerer, als ich gedacht habe.", "b": "Test düşündüğümden daha zordu. (als: -den daha)"}, {"f": "Der Test war genauso schwer, wie ich gedacht habe.", "b": "Test düşündüğüm kadar zordu. (wie: kadar)"}, {"f": "Je mehr Überstunden ich mache, desto mehr Geld verdiene ich.", "b": "Ne kadar çok mesai yaparsam o kadar çok para kazanırım. (je...desto)"}, {"f": "Ich schütze meine Augen, indem ich meine Sonnenbrille trage.", "b": "Güneş gözlüğü takarak gözlerimi koruyorum. (indem: -erek/-arak)"}, {"f": "Man kann Benzin sparen, indem man langsam fährt.", "b": "Yavaş sürerek benzin tasarrufu yapılabilir."}, {"f": "Wir sparen viel Geld, dadurch dass wir in einer kleinen Wohnung leben.", "b": "Küçük bir dairede yaşayarak çok para biriktiriyoruz. (dadurch dass)"}, {"f": "Man kann seine Sprachkenntnisse dadurch verbessern, dass man Vokabeln lernt.", "b": "Kelime öğrenerek dil bilgisini geliştirebilir."}, {"f": "Er beginnt jeden Morgen seine Arbeit, ohne seine Kollegen zu grüßen.", "b": "Her sabah, meslektaşlarını selamlamadan işine başlar. (ohne zu: -madan)"}, {"f": "Sie sind gegangen, ohne dass sie bezahlt haben.", "b": "Ödeme yapmadan gittiler. (ohne dass)"}, {"f": "Soweit ich weiß, kommt Malaika aus Afrika.", "b": "Bildiğim kadarıyla Malaika Afrika'dan geliyor. (soweit: -diği kadarıyla)"}, {"f": "Selbst wenn die Kinder in der Schule sind, kann ich mich nicht ausruhen.", "b": "Çocuklar okulda olsa bile dinlenemiyorum. (selbst wenn/auch wenn: -sa bile)"}, {"f": "Ich werde dort sein, es sei denn, es regnet.", "b": "Yağmur yağmadıkça orada olacağım. (es sei denn: -medikçe)"}, {"f": "Wir gehen spazieren, außer wenn es den ganzen Tag regnet.", "b": "Bütün gün yağmur yağmadıkça yürüyüşe çıkarız. (außer wenn)"}, {"f": "Das Wetter muss gut sein, sonst gehen wir nicht spazieren.", "b": "Havanın iyi olması lazım, yoksa yürüyüşe çıkmayız. (sonst: yoksa)"}, {"f": "Er muss die Deutschprüfung bestehen, anderenfalls kann er nicht studieren.", "b": "Almanca sınavını geçmesi lazım, aksi takdirde okuyamaz. (anderenfalls)"}, {"f": "Je nachdem ob das Wetter gut oder schlecht ist, gehen wir spazieren oder bleiben zu Hause.", "b": "Hava iyi ya da kötü olmasına bağlı olarak yürüyüşe çıkarız ya da evde kalırız. (je nachdem)"}, {"f": "Je nach Region zeigt sich der Winter ganz unterschiedlich.", "b": "Bölgeye bağlı olarak kış çok farklı görünür. (je nach: -e bağlı olarak)"}, {"f": "Die Mannschaft hat nicht gut gespielt, dennoch hat sie das Spiel gewonnen.", "b": "Takım iyi oynamadı, yine de maçı kazandı. (dennoch/trotzdem)"}, {"f": "Ich habe ihn eingeladen, jedoch kam er nicht zu meiner Party.", "b": "Onu davet ettim, ama partime gelmedi. (jedoch)"}, {"f": "Der letzten Meldung zufolge ist kein Schaden entstanden.", "b": "Son habere göre hiçbir hasar oluşmadı. (zufolge + Dat: -e göre)"}, {"f": "Laut Statistik sind 80% der Deutschen übergewichtig.", "b": "İstatistiklere göre Almanların %80'i aşırı kilolu. (laut/gemäß/nach: -e göre)"}, {"f": "Wir sammeln Geld zugunsten behinderter Kinder.", "b": "Engelli çocuklar lehine para topluyoruz. (zugunsten + Gen: lehine)"}, {"f": "Der Lehrer erklärt die Übung anhand eines Beispiels.", "b": "Öğretmen alıştırmayı bir örnek üzerinden açıklıyor. (anhand: üzerinden, aracılığıyla)"}, {"f": "Mittels eines besonderen Zertifikates darf ich an der Uni als Dozent arbeiten.", "b": "Özel bir sertifika sayesinde üniversitede öğretim görevlisi olarak çalışabiliyorum. (mittels: vasıtasıyla)"}, {"f": "Ich möchte dir anläßlich deines Ergebnisses gratulieren.", "b": "Sonucun dolayısıyla seni tebrik etmek istiyorum. (anläßlich: -den ötürü, münasebetiyle)"}, {"f": "Aufgrund des schlechten Wetters kann der Ausflug leider nicht stattfinden.", "b": "Kötü hava nedeniyle gezi maalesef gerçekleşemiyor. (aufgrund + Gen: nedeniyle)"}, {"f": "Angesichts der unsicheren Wetterlage ziehen wir es vor, den Ausflug zu verschieben.", "b": "Belirsiz hava durumu karşısında geziyi ertelemeyi tercih ediyoruz. (angesichts: karşısında, göz önünde tutulunca)"}, {"f": "Dank eurer Mithilfe wurde das Fest ein großer Erfolg.", "b": "Yardımınız sayesinde şölen büyük bir başarı oldu. (dank + Dat/Gen: sayesinde)"}, {"f": "Mangels Interesse wurde der Vortrag kurzfristig abgesagt.", "b": "İlgi yetersizliğinden dolayı konferans kısa süre önce iptal edildi. (mangels: yetersizliğinden)"}, {"f": "Ich hoffe, Sie sind mit der Arbeit binnen einer Woche fertig.", "b": "Umarım işi bir hafta içinde bitirirsiniz. (binnen + Gen: içinde)"}, {"f": "Innerhalb des Hauses war es wärmer als draußen.", "b": "Evin içinde dışarıdan daha sıcaktı. (innerhalb: içinde)"}, {"f": "Das Verhalten des Schülers hatte zur Folge, dass er vom Unterricht ausgeschlossen wurde.", "b": "Öğrencinin davranışı, dersten uzaklaştırılmasıyla sonuçlandı. (zur Folge haben: ile sonuçlanmak)"}, {"f": "Ich habe Angst vor dem Flug, aber ich muss es in Kauf nehmen, dass ich fliegen muss.", "b": "Uçuştan korkuyorum ama uçmam gerektiğini kabullenmem lazım. (in Kauf nehmen: kabullenmek)"}, {"f": "Corona ist eine tödliche Krankheit, die schwer in den Griff zu bekommen ist.", "b": "Corona, kontrol altına alınması zor, ölümcül bir hastalıktır. (in den Griff bekommen: kontrol altına almak)"}, {"f": "Im Hinblick auf eine Familiengründung ist Ehrlichkeit äußerst wichtig.", "b": "Aile kurmak bakımından dürüstlük son derece önemlidir. (im Hinblick auf/hinsichtlich: bakımından)"}, {"f": "Er hatte einige Fragen in Bezug auf den neuen Vertrag.", "b": "Yeni sözleşmeyle ilgili birkaç sorusu vardı. (in Bezug auf/bezüglich: ile ilgili olarak)"}, {"f": "Ich beziehe mich auf Ihren Brief vom 20. April.", "b": "20 Nisan tarihli mektubunuza atıfta bulunuyorum. (sich <script>
/* ============ CONFIG ============ */
const GROUP_SIZE = 15;
const PALETTE = ["pink","peach","mint","sky","lilac","lemon","coral","sage"];

/* ============ STATE ============ */
let currentSection = null;
let currentDeck = [];   // array of card indices into full pool (shuffled or not)
let currentPool = [];   // full card list for the section
let groupStart = 0;
let cursor = 0;
let flipped = false;

/* ============ ELEMENTS ============ */
const homeView = document.getElementById('homeView');
const studyView = document.getElementById('studyView');
const doneView = document.getElementById('doneView');
const topicGrid = document.getElementById('topicGrid');
const studyTitle = document.getElementById('studyTitle');
const cardEl = document.getElementById('card');
const frontTxt = document.getElementById('frontTxt');
const backTxt = document.getElementById('backTxt');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const cardStage = document.getElementById('cardStage');

/* ============ BUILD HOME GRID ============ */
function buildGrid(){
  topicGrid.innerHTML = '';
  SECTIONS.forEach((sec, i) => {
    const color = PALETTE[i % PALETTE.length];
    const div = document.createElement('div');
    div.className = 'topic-card';
    div.style.background = `var(--${color})`;
    div.innerHTML = `<div><h3>${sec.title}</h3><p>${sec.sub}</p></div><div class="count">${sec.cards.length} kart</div>`;
    div.addEventListener('click', () => openSection(i));
    topicGrid.appendChild(div);
  });
}

/* ============ OPEN SECTION ============ */
function openSection(i){
  currentSection = i;
  currentPool = SECTIONS[i].cards.map((c, idx) => idx);
  groupStart = 0;
  studyTitle.textContent = SECTIONS[i].title;
  startGroup();
  homeView.style.display = 'none';
  studyView.classList.add('active');
  doneView.classList.remove('active');
}

function backToHome(){
  studyView.classList.remove('active');
  doneView.classList.remove('active');
  homeView.style.display = 'block';
}

/* ============ GROUP / DECK LOGIC ============ */
function startGroup(){
  currentDeck = currentPool.slice(groupStart, groupStart + GROUP_SIZE);
  cursor = 0;
  flipped = false;
  doneView.classList.remove('active');
  studyView.classList.add('active');
  renderCard();
}

function shuffleDeck(){
  const pool = currentPool.slice();
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  currentPool = pool;
  groupStart = 0;
  startGroup();
}

function renderCard(){
  const idx = currentDeck[cursor];
  const cardData = SECTIONS[currentSection].cards[idx];
  frontTxt.textContent = cardData.f;
  backTxt.textContent = cardData.b;
  cardEl.classList.remove('flipped','swipe-left','swipe-right');
  flipped = false;
  const totalGroups = Math.ceil(currentPool.length / GROUP_SIZE);
  const thisGroup = Math.floor(groupStart / GROUP_SIZE) + 1;
  progressFill.style.width = ((cursor+1)/currentDeck.length*100) + '%';
  progressLabel.textContent = `Grup ${thisGroup}/${totalGroups} · Kart ${cursor+1}/${currentDeck.length}`;
}

function flipCard(){
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function nextCard(animateDir){
  if(animateDir){
    cardEl.classList.add(animateDir === 'left' ? 'swipe-left' : 'swipe-right');
  }
  setTimeout(() => {
    if(cursor < currentDeck.length - 1){
      cursor++;
      renderCard();
    } else {
      showDone();
    }
  }, animateDir ? 220 : 0);
}

function prevCard(){
  if(cursor > 0){
    cursor--;
    renderCard();
  }
}

function showDone(){
  studyView.classList.remove('active');
  doneView.classList.add('active');
  const totalGroups = Math.ceil(currentPool.length / GROUP_SIZE);
  const thisGroup = Math.floor(groupStart / GROUP_SIZE) + 1;
  document.getElementById('doneSub').textContent =
    thisGroup < totalGroups
      ? `${SECTIONS[currentSection].title} · Grup ${thisGroup}/${totalGroups} tamamlandı.`
      : `${SECTIONS[currentSection].title} konusunu tamamladın!`;
  document.getElementById('btnNextGroup').style.display = thisGroup < totalGroups ? 'inline-block' : 'none';
}

/* ============ EVENTS ============ */
document.getElementById('btnBack').addEventListener('click', backToHome);
document.getElementById('btnDoneHome').addEventListener('click', backToHome);
document.getElementById('btnShuffle').addEventListener('click', shuffleDeck);
document.getElementById('btnFlip').addEventListener('click', flipCard);
document.getElementById('btnNext').addEventListener('click', () => nextCard(null));
document.getElementById('btnPrev').addEventListener('click', prevCard);
document.getElementById('btnRepeat').addEventListener('click', startGroup);
document.getElementById('btnNextGroup').addEventListener('click', () => {
  groupStart += GROUP_SIZE;
  startGroup();
});
cardEl.addEventListener('click', flipCard);

document.getElementById('btnFullscreen').addEventListener('click', () => {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if(!isFs && req){ req.call(el); }
  else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if(exit) exit.call(document);
  }
});

document.addEventListener('keydown', (e) => {
  if(!studyView.classList.contains('active')) return;
  if(e.key === 'ArrowRight'){ nextCard('right'); }
  else if(e.key === 'ArrowLeft'){ prevCard(); }
  else if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); flipCard(); }
});

/* Touch swipe */
let touchStartX = null, touchStartY = null;
cardStage.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
cardStage.addEventListener('touchend', (e) => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) nextCard('left'); else prevCard();
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

/* ============ INIT ============ */
buildGrid();
</script>
